# LangGraph4J Configuration

# Server
server.port=8080

# MySQL Database (for workflow persistence)
mysql.url=jdbc:mysql://localhost:3306/langgraph4j-engine?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
mysql.user=root
mysql.password=root
mysql.enabled=true

# Redis (for checkpoint management)
redis.uri=redis://localhost:6379

# LLM Configuration
llm.baseUrl=https://api.openai.com/v1
llm.apiKey=${OPENAI_API_KEY:}
llm.model=gpt-3.5-turbo

# Embedding Configuration
embedding.baseUrl=${llm.baseUrl}
embedding.apiKey=${llm.apiKey}
embedding.model=text-embedding-3-small
embedding.dimensions=1536

# PostgreSQL + PGVector Configuration (for knowledge base / RAG)
pgvector.url=jdbc:postgresql://localhost:5432/langgraph4j
pgvector.user=postgres
pgvector.password=
pgvector.enabled=false

# Logging
logging.level.com.langgraph4j=INFO
logging.level.io.vertx=WARN
